{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kings Heralds Natural Hub</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Login to Your Account</h2>
            <form id="loginForm">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" id="loginBtn" disabled>Login</button>
                <div id="loadingCircle" class="loading-circle" style="display: none;"></div>
            </form>
            <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loadingCircle = document.getElementById('loadingCircle');
        const form = document.getElementById('loginForm');

        function validateForm() {
            loginBtn.disabled = !(usernameInput.value.trim() && passwordInput.value.trim());
        }

        usernameInput.addEventListener('input', validateForm);
        passwordInput.addEventListener('input', validateForm);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.style.display = 'none';
            loadingCircle.style.display = 'inline-block';
            
            const response = await fetch('/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: new URLSearchParams({
                    'username': usernameInput.value,
                    'password': passwordInput.value
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                alert(data.error || 'Login failed');
                loginBtn.style.display = 'block';
                loadingCircle.style.display = 'none';
            }
        });
    </script>
</body>
</html>
